proxies:
  - name: "warp-vps-vless"
    type: vless
    server: 43.165.173.189
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: www.microsoft.com
    client-fingerprint: chrome
    reality-opts:
      public-key: REPLACE_WITH_PUBLIC_KEY
      short-id: REPLACE_WITH_SHORT_ID
  - name: "warp-vps-hy2"
    type: hysteria2
    server: 43.165.173.189
    port: 8443
    password: "53GydXE0fJ9OzJk4gLfjng=="
    sni: www.bing.com
    skip-cert-verify: true
    alpn:
      - h3
  - name: "warp-vps-ss"
    type: ss
    server: 43.165.173.189
    port: 444
    cipher: aes-256-gcm
    password: "REPLACE_WITH_PASSWORD"

proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - warp-vps-vless
      - warp-vps-hy2
      - warp-vps-ss

rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/BanAD.yaml"
    path: ./ruleset/reject.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Direct.yaml"
    path: ./ruleset/direct.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/ChinaIp.yaml"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/LocalAreaNetwork.yaml"
    path: ./ruleset/lancidr.yaml
    interval: 86400

rules:
  - RULE-SET,reject,REJECT
  - RULE-SET,direct,DIRECT
  - RULE-SET,lancidr,DIRECT
  - DOMAIN-SUFFIX,steamcontent.com,DIRECT
  - DOMAIN-SUFFIX,steamserver.net,DIRECT
  - DOMAIN-SUFFIX,steamcdn-a.akamaihd.net,DIRECT
  - DOMAIN-SUFFIX,steamstatic.com,DIRECT
  - DOMAIN,client-update.akamai.steamstatic.com,DIRECT
  - DOMAIN,media.steampowered.com,DIRECT
  - GEOIP,LAN,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve
  - RULE-SET,cncidr,DIRECT,no-resolve
  - MATCH,PROXY